<svg viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a5568"/>
    </marker>
  </defs>

  <rect width="1200" height="680" fill="#f7f9fc"/>

  <text x="600" y="45" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">Investment Analytics Platform — Architecture</text>
  <text x="600" y="72" text-anchor="middle" font-size="14" fill="#718096">Data Lake → Data Warehouse → BI Layer</text>

  <!-- LAYER 1: DATA LAKE -->
  <rect x="40" y="110" width="280" height="500" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="138" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">DATA LAKE (Raw)</text>

  <g font-size="12.5" fill="#1e3a5f">
    <rect x="60" y="155" width="240" height="40" rx="6" fill="#ffffff" stroke="#93c5fd"/>
    <text x="180" y="172" text-anchor="middle">inversiones_raw.csv</text>
    <text x="180" y="186" text-anchor="middle" font-size="10" fill="#64748b">simulado</text>

    <rect x="60" y="205" width="240" height="40" rx="6" fill="#ffffff" stroke="#93c5fd"/>
    <text x="180" y="222" text-anchor="middle">proyectos_raw.csv</text>
    <text x="180" y="236" text-anchor="middle" font-size="10" fill="#64748b">simulado</text>

    <rect x="60" y="255" width="240" height="40" rx="6" fill="#ffffff" stroke="#93c5fd"/>
    <text x="180" y="272" text-anchor="middle">presupuestos_raw.csv</text>
    <text x="180" y="286" text-anchor="middle" font-size="10" fill="#64748b">simulado</text>

    <rect x="60" y="305" width="240" height="40" rx="6" fill="#ffffff" stroke="#93c5fd"/>
    <text x="180" y="322" text-anchor="middle">ejecucion_gasto_raw.csv</text>
    <text x="180" y="336" text-anchor="middle" font-size="10" fill="#64748b">simulado, grano transaccional</text>

    <rect x="60" y="355" width="240" height="44" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="180" y="373" text-anchor="middle" font-weight="700">tipo_cambio_raw.csv</text>
    <text x="180" y="388" text-anchor="middle" font-size="10" fill="#92400e">dato REAL — API BCRP</text>
  </g>

  <text x="180" y="585" text-anchor="middle" font-size="11" fill="#475569">Características: campos inconsistentes,</text>
  <text x="180" y="600" text-anchor="middle" font-size="11" fill="#475569">fechas sin estandarizar, ~3-5% nulos</text>

  <!-- ARROW 1 -->
  <line x1="320" y1="360" x2="395" y2="360" stroke="#4a5568" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="357" y="345" text-anchor="middle" font-size="11" fill="#4a5568">Python</text>
  <text x="357" y="358" text-anchor="middle" font-size="11" fill="#4a5568">(pandas)</text>

  <!-- LAYER 1.5: ETL -->
  <rect x="400" y="270" width="170" height="180" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="485" y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#9d174d">ETL</text>
  <text x="485" y="320" text-anchor="middle" font-size="11" fill="#831843">• Limpieza</text>
  <text x="485" y="338" text-anchor="middle" font-size="11" fill="#831843">• Estandarización</text>
  <text x="485" y="356" text-anchor="middle" font-size="11" fill="#831843">• Normalización</text>
  <text x="485" y="374" text-anchor="middle" font-size="11" fill="#831843">  de moneda (PEN)</text>
  <text x="485" y="392" text-anchor="middle" font-size="11" fill="#831843">• Validaciones</text>
  <text x="485" y="410" text-anchor="middle" font-size="10" fill="#be185d" font-style="italic">etl_log.txt</text>

  <!-- ARROW 2 -->
  <line x1="575" y1="360" x2="650" y2="360" stroke="#4a5568" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- LAYER 2: DATA WAREHOUSE -->
  <rect x="655" y="110" width="280" height="500" rx="10" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
  <text x="795" y="138" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">DATA WAREHOUSE (Star Schema)</text>

  <rect x="745" y="155" width="100" height="50" rx="6" fill="#ffffff" stroke="#fb923c" stroke-width="2"/>
  <text x="795" y="176" text-anchor="middle" font-size="11" font-weight="700">fact_</text>
  <text x="795" y="190" text-anchor="middle" font-size="11" font-weight="700">investments</text>

  <g font-size="11" fill="#7c2d12">
    <rect x="675" y="235" width="200" height="34" rx="6" fill="#ffffff" stroke="#fdba74"/>
    <text x="775" y="256" text-anchor="middle">dim_project</text>

    <rect x="675" y="280" width="200" height="34" rx="6" fill="#ffffff" stroke="#fdba74"/>
    <text x="775" y="301" text-anchor="middle">dim_area</text>

    <rect x="675" y="325" width="200" height="34" rx="6" fill="#ffffff" stroke="#fdba74"/>
    <text x="775" y="346" text-anchor="middle">dim_time</text>

    <rect x="675" y="370" width="200" height="34" rx="6" fill="#ffffff" stroke="#fdba74"/>
    <text x="775" y="391" text-anchor="middle">dim_currency</text>

    <rect x="675" y="415" width="200" height="34" rx="6" fill="#ffffff" stroke="#fdba74"/>
    <text x="775" y="436" text-anchor="middle">dim_investment</text>
  </g>

  <text x="795" y="480" text-anchor="middle" font-size="11" fill="#7c2d12">Moneda base de reporting: PEN</text>
  <text x="795" y="498" text-anchor="middle" font-size="11" fill="#7c2d12">Grano: 1 fila = 1 transacción de gasto</text>

  <!-- ARROW 3 -->
  <line x1="940" y1="360" x2="1010" y2="360" stroke="#4a5568" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="975" y="345" text-anchor="middle" font-size="11" fill="#4a5568">Power</text>
  <text x="975" y="358" text-anchor="middle" font-size="11" fill="#4a5568">Query</text>

  <!-- LAYER 3: BI -->
  <rect x="1015" y="180" width="150" height="360" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="1090" y="208" text-anchor="middle" font-size="15" font-weight="700" fill="#854d0e">BI LAYER</text>
  <text x="1090" y="228" text-anchor="middle" font-size="11" fill="#713f12">Power BI</text>

  <g font-size="10.5" fill="#713f12">
    <rect x="1030" y="245" width="120" height="32" rx="5" fill="#ffffff" stroke="#fde047"/>
    <text x="1090" y="265" text-anchor="middle">KPIs financieros</text>

    <rect x="1030" y="285" width="120" height="32" rx="5" fill="#ffffff" stroke="#fde047"/>
    <text x="1090" y="305" text-anchor="middle">Budget vs Actual</text>

    <rect x="1030" y="325" width="120" height="32" rx="5" fill="#ffffff" stroke="#fde047"/>
    <text x="1090" y="345" text-anchor="middle">Execution Rate</text>

    <rect x="1030" y="365" width="120" height="32" rx="5" fill="#ffffff" stroke="#fde047"/>
    <text x="1090" y="385" text-anchor="middle">Projects At Risk</text>

    <rect x="1030" y="405" width="120" height="32" rx="5" fill="#ffffff" stroke="#fde047"/>
    <text x="1090" y="425" text-anchor="middle">Análisis por área</text>

    <rect x="1030" y="445" width="120" height="32" rx="5" fill="#ffffff" stroke="#fde047"/>
    <text x="1090" y="465" text-anchor="middle">Tendencias</text>
  </g>

  <!-- Legend -->
  <rect x="40" y="630" width="14" height="14" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="60" y="641" font-size="11" fill="#475569">Dato real (API BCRP)</text>
  <rect x="220" y="630" width="14" height="14" fill="#ffffff" stroke="#93c5fd"/>
  <text x="240" y="641" font-size="11" fill="#475569">Dato simulado</text>
</svg>
